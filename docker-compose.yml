services:
  rbooth:
    image: ghcr.io/d-tecnolife/rbooth:${RBOOTH_TAG:-latest}
    container_name: rbooth
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      APP_NAME: "${APP_NAME:-rbooth}"
      APP_SUBTITLE: "${APP_SUBTITLE:-happy birthday}"
      APP_BASE_URL: "${APP_BASE_URL:?set APP_BASE_URL}"
      DISPLAY_TIMEZONE: "${DISPLAY_TIMEZONE:-UTC}"
      HOME_WELCOME_TITLE: "${HOME_WELCOME_TITLE:-}"
      HOME_WELCOME_BODY: "${HOME_WELCOME_BODY:-}"
      HOME_ACCESS_TITLE: "${HOME_ACCESS_TITLE:-}"
      HOME_ACCESS_BODY: "${HOME_ACCESS_BODY:-}"
      BOARD_EMPTY_TITLE: "${BOARD_EMPTY_TITLE:-}"
      BOARD_EMPTY_BODY: "${BOARD_EMPTY_BODY:-}"
      ADMIN_INTRO_TITLE: "${ADMIN_INTRO_TITLE:-}"
      ADMIN_INTRO_BODY: "${ADMIN_INTRO_BODY:-}"
      DATA_DIR: "/app/data"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?set ADMIN_PASSWORD}"
      AUTH_SECRET: "${AUTH_SECRET:?set AUTH_SECRET}"
    volumes:
      - ./data:/app/data
      - /mnt/storage/media/rbooth:/app/media
